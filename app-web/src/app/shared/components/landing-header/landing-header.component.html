<a href="#main-content" class="skip-link">Saltar al contenido</a>

<header class="landing-header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo-link">
      <svg
        width="160"
        height="44"
        viewBox="0 0 165 44"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        class="logo-svg"
      >
        <text x="0" y="30" font-family="'Fraunces', Georgia, serif" font-size="24" font-weight="700" letter-spacing="-0.5">
          <tspan fill="#9DC183">holacitas</tspan><tspan fill="#5D6D7E">.app</tspan>
        </text>
      </svg>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      @for (item of menuItems; track item.label) {
        <a
          [routerLink]="item.routerLink"
          [fragment]="item.fragment"
          class="nav-link"
          [class.active]="isActive(item)"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons">
      <p-button 
        label="Iniciar sesión" 
        styleClass="p-button-text nav-btn-text"
        routerLink="/login"
      />
      <p-button 
        label="Comenzar" 
        styleClass="nav-btn-primary"
        routerLink="/signup"
      />
    </div>

    <!-- Mobile Menu Button -->
    <p-button
      class="mobile-menu-trigger"
      icon="pi pi-bars"
      styleClass="p-button-rounded p-button-text mobile-menu-btn"
      (onClick)="mobileMenuVisible = true"
    />
  </div>

  <!-- Mobile Menu -->
  <p-drawer
    [(visible)]="mobileMenuVisible"
    position="right"
    styleClass="mobile-drawer"
    [blockScroll]="true"
    [showCloseIcon]="false"
  >
    <div class="mobile-sidebar-header">
      <svg
        width="120"
        height="32"
        viewBox="0 0 140 36"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <text x="0" y="28" font-family="'Fraunces', Georgia, serif" font-size="22" font-weight="700" letter-spacing="-0.5">
          <tspan fill="#9DC183">holacitas</tspan><tspan fill="#5D6D7E">.app</tspan>
        </text>
      </svg>
    </div>

    <div class="mobile-menu-content">
      <nav class="mobile-nav">
        @for (item of menuItems; track item.label) {
          <a
            [routerLink]="item.routerLink"
            [fragment]="item.fragment"
            class="mobile-nav-link"
            [class.active]="isActive(item)"
            (click)="mobileMenuVisible = false"
          >
            {{ item.label }}
            <i class="pi pi-arrow-right"></i>
          </a>
        }
      </nav>

      <div class="mobile-auth-buttons">
        <p-button
          label="Iniciar sesión"
          styleClass="p-button-outlined w-full"
          routerLink="/login"
          (onClick)="mobileMenuVisible = false"
        />
      </div>
    </div>
  </p-drawer>
</header>
