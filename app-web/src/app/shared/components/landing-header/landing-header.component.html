<header class="landing-header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo-link">
      <svg 
        width="140" 
        height="36" 
        viewBox="0 0 140 36" 
        fill="none" 
        xmlns="http://www.w3.org/2000/svg"
        class="logo-svg"
      >
        <text 
          x="0" 
          y="26" 
          font-family="var(--font-display)" 
          font-size="22" 
          font-weight="600"
        >
          <tspan fill="#9DC183">CITASYA</tspan><tspan fill="#5D6D7E">.APP</tspan>
        </text>
      </svg>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      @for (item of menuItems; track item.label) {
        @if (item.routerLink) {
          <a 
            [routerLink]="item.routerLink" 
            [fragment]="item.fragment"
            class="nav-link"
          >
            {{ item.label }}
          </a>
        } @else {
          <a 
            [href]="'#' + item.fragment"
            class="nav-link"
          >
            {{ item.label }}
          </a>
        }
      }
    </nav>

    <!-- Auth Buttons -->
    <div class="auth-buttons">
      <p-button 
        label="Iniciar sesión" 
        styleClass="p-button-text nav-btn-text"
        routerLink="/login"
      />
      <p-button 
        label="Comenzar" 
        styleClass="nav-btn-primary"
        routerLink="/signup"
      />
    </div>

    <!-- Mobile Menu Button -->
    <p-button 
      icon="pi pi-bars" 
      styleClass="p-button-rounded p-button-text mobile-menu-btn"
      (onClick)="mobileMenuVisible = true"
    />
  </div>

  <!-- Mobile Menu -->
  <p-dialog 
    [(visible)]="mobileMenuVisible" 
    [modal]="true" 
    [style]="{ width: '85vw', maxWidth: '360px' }"
    [showHeader]="true"
    header="Menú"
    styleClass="mobile-drawer"
    [closable]="true"
  >
    <ng-template pTemplate="header">
      <div class="drawer-header">
        <svg 
          width="120" 
          height="32" 
          viewBox="0 0 140 36" 
          fill="none" 
          xmlns="http://www.w3.org/2000/svg"
        >
          <text 
            x="0" 
            y="26" 
            font-family="var(--font-display)" 
            font-size="22" 
            font-weight="600"
          >
            <tspan fill="#9DC183">CITASYA</tspan><tspan fill="#5D6D7E">.APP</tspan>
          </text>
        </svg>
      </div>
    </ng-template>
    
    <div class="mobile-menu-content">
      <nav class="mobile-nav">
        @for (item of menuItems; track item.label) {
          @if (item.routerLink) {
            <a 
              [routerLink]="item.routerLink" 
              [fragment]="item.fragment"
              class="mobile-nav-link"
              (click)="mobileMenuVisible = false"
            >
              {{ item.label }}
              <i class="pi pi-arrow-right"></i>
            </a>
          } @else {
            <a 
              [href]="'#' + item.fragment"
              class="mobile-nav-link"
              (click)="mobileMenuVisible = false"
            >
              {{ item.label }}
              <i class="pi pi-arrow-right"></i>
            </a>
          }
        }
      </nav>
      
      <div class="mobile-auth-buttons">
        <p-button 
          label="Iniciar sesión" 
          styleClass="p-button-outlined w-full"
          routerLink="/login"
          (onClick)="mobileMenuVisible = false"
        />
        <p-button 
          label="Crear cuenta gratis" 
          styleClass="p-button-primary w-full"
          routerLink="/signup"
          (onClick)="mobileMenuVisible = false"
        />
      </div>
    </div>
  </p-dialog>
</header>
