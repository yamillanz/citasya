  <!-- Suppress Supabase NavigatorLockAcquireTimeoutError and AuthApiError logs -->
  <script>
    // Override console.error as early as possible
    (function() {
      var originalError = console.error;
      console.error = function (message) {
        var fullMessage = Array.prototype.slice.call(arguments).map(function(p) {
          return typeof p === 'string' ? p : (p && p.toString ? p.toString() : JSON.stringify(p));
        }).join(' ');
        
        if (
          fullMessage.includes('NavigatorLockAcquireTimeoutError') ||
          fullMessage.includes('AuthApiError: Invalid Refresh Token') ||
          fullMessage.includes('lock:sb-')
        ) {
          return;
        }
        originalError.apply(console, arguments);
      };
      
      // Suppress unhandled promise rejections from Supabase
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        if (reason && typeof reason === 'object' && reason.message) {
          if (
            reason.message.includes('NavigatorLockAcquireTimeoutError') ||
            reason.message.includes('AuthApiError: Invalid Refresh Token') ||
            reason.message.includes('lock:sb-')
          ) {
            event.preventDefault();
          }
        }
      });
    })();
  </script>
